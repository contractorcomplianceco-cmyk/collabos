      responses:
        "200":
          description: SOPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SopRecord"
  /settings:
    get:
      operationId: getAppSettings
      tags: [settings]
      summary: Get workspace app settings
      responses:
        "200":
          description: App settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettingsRecord"
    patch:
      operationId: updateAppSettings
      tags: [settings]
      summary: Update workspace app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettingsRecord"
