components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
    UserRole:
      type: string
      enum:
        - super_admin
        - rose_admin
        - carmen_admin
        - leadership_reviewer
        - contributor
        - viewer
        - guest
    UserStatus:
      type: string
      enum: [active, inactive]
    UserProfile:
      type: object
      required: [id, name, email, role, status, isDemo, permissions, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        status: { $ref: "#/components/schemas/UserStatus" }
        isDemo: { type: boolean }
        mustChangePassword: { type: boolean }
        permissions:
          type: array
          items: { type: string }
        lastLoginAt: { type: ["string", "null"] }
        moduleLastSeen:
          type: object
          additionalProperties: { type: string }
        createdAt: { type: string }
    ModuleSeenInput:
      type: object
      required: [module]
      properties:
        module:
          type: string
          enum:
            - dashboard
            - review-queue
            - mind-meld
            - agent-queue
            - external-intake
            - project-tasks
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, minLength: 1 }
        password: { type: string, minLength: 1 }
    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string, minLength: 1 }
        newPassword: { type: string, minLength: 8 }
    AuthSession:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/UserProfile" }
    UserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, minLength: 3 }
        password: { type: string, minLength: 8 }
        role: { $ref: "#/components/schemas/UserRole" }
        isDemo: { type: boolean }
    UserUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, minLength: 3 }
        role: { $ref: "#/components/schemas/UserRole" }
        status: { $ref: "#/components/schemas/UserStatus" }
    TempPasswordResult:
      type: object
      required: [tempPassword, user]
      properties:
        tempPassword: { type: string }
        user: { $ref: "#/components/schemas/UserProfile" }
    AuditLogEntry:
      type: object
      required: [id, actorName, action, targetType, sourceArea, createdAt]
      properties:
        id: { type: integer }
        actorId: { type: ["integer", "null"] }
        actorName: { type: string }
        action: { type: string }
        targetType: { type: string }
        targetId: { type: ["string", "null"] }
        sourceArea: { type: string }
        details: { type: ["string", "null"] }
        createdAt: { type: string }
    AuditEventInput:
      type: object
      required: [action, targetType, sourceArea]
      properties:
        action:
          type: string
          enum:
            - intake_routed
            - item_marked_sensitive
            - item_approved
            - item_rejected
            - brain_update_suggested
            - brain_update_approved
            - build_prompt_generated
            - integration_setting_changed
        targetType: { type: string }
        targetId: { type: string }
        sourceArea: { type: string }
        details: { type: string }
    MockupStatus:
      type: string
      enum:
        - draft
        - needs_rose_review
        - needs_carmen_review
        - needs_both_review
        - approved_for_build
        - sent_back
        - archived
    MockupSourceType:
      type: string
      enum: [intake_item, idea, build_request, mind_meld_item, scratch]
    MockupBriefData:
      type: object
      required: [productName, audience, mainGoal, userRoles, keyWorkflows, mustHaveFeatures, dataNeeded, privacyRules, brandDirection, visualFeel, approvalNeeded, buildReadiness]
      properties:
        productName: { type: string }
        audience: { type: string }
        mainGoal: { type: string }
        userRoles: { type: string }
        keyWorkflows: { type: string }
        mustHaveFeatures: { type: string }
        dataNeeded: { type: string }
        privacyRules: { type: string }
        brandDirection: { type: string }
        visualFeel: { type: string }
        approvalNeeded:
          type: string
          enum: [rose, carmen, both, none]
        buildReadiness:
          type: string
          enum: [not_ready, needs_detail, almost_ready, build_ready]
    MockupScreenData:
      type: object
      required: [id, name, purpose, blocks]
      properties:
        id: { type: string }
        name: { type: string }
        purpose: { type: string }
        blocks:
          type: array
          items: { type: string }
    VisualDirectionData:
      type: object
      required: [mood, colorDirection, layoutDensity, buttonStyle, cardStyle, navigationStyle, motionLevel, overallFeel]
      properties:
        mood: { type: string }
        colorDirection: { type: string }
        layoutDensity: { type: string }
        buttonStyle: { type: string }
        cardStyle: { type: string }
        navigationStyle: { type: string }
        motionLevel: { type: string }
        overallFeel: { type: string }
    MockupRecord:
      type: object
      required: [id, title, sourceType, ownerName, status, brief, screens, visualDirection, createdAt, updatedAt]
      properties:
        id: { type: integer }
        title: { type: string }
        sourceType: { $ref: "#/components/schemas/MockupSourceType" }
        sourceItemId: { type: ["string", "null"] }
        sourceSummary: { type: ["string", "null"] }
        ownerId: { type: ["integer", "null"] }
        ownerName: { type: string }
        status: { $ref: "#/components/schemas/MockupStatus" }
        brief: { $ref: "#/components/schemas/MockupBriefData" }
        screens:
          type: array
          items: { $ref: "#/components/schemas/MockupScreenData" }
        visualDirection: { $ref: "#/components/schemas/VisualDirectionData" }
        statusNote: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
    MockupInput:
      type: object
      required: [title, sourceType, brief, screens, visualDirection]
      properties:
        title: { type: string, minLength: 1 }
        sourceType: { $ref: "#/components/schemas/MockupSourceType" }
        sourceItemId: { type: string }
        sourceSummary: { type: string }
        brief: { $ref: "#/components/schemas/MockupBriefData" }
        screens:
          type: array
          items: { $ref: "#/components/schemas/MockupScreenData" }
        visualDirection: { $ref: "#/components/schemas/VisualDirectionData" }
    MockupUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        brief: { $ref: "#/components/schemas/MockupBriefData" }
        screens:
          type: array
          items: { $ref: "#/components/schemas/MockupScreenData" }
        visualDirection: { $ref: "#/components/schemas/VisualDirectionData" }
    MockupStatusChange:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/MockupStatus" }
        note: { type: string }
    MockupVersionRecord:
      type: object
      required: [id, mockupId, versionName, content, createdByName, createdAt]
      properties:
        id: { type: integer }
        mockupId: { type: integer }
        versionName: { type: string }
        content: { $ref: "#/components/schemas/MockupVersionContentData" }
        notes: { type: ["string", "null"] }
        createdById: { type: ["integer", "null"] }
        createdByName: { type: string }
        createdAt: { type: string }
    MockupVersionContentData:
      type: object
      required: [brief, screens, visualDirection]
      properties:
        brief: { $ref: "#/components/schemas/MockupBriefData" }
        screens:
          type: array
          items: { $ref: "#/components/schemas/MockupScreenData" }
        visualDirection: { $ref: "#/components/schemas/VisualDirectionData" }
    MockupVersionInput:
      type: object
      required: [versionName]
      properties:
        versionName: { type: string, minLength: 1 }
        notes: { type: string }
    RecommendationCategory:
      type: string
      enum:
        - duplicate
        - team-pulse
        - sop-update
        - automation
        - mockup-prompt
        - market
        - mind-meld-handoff
        - company-record
        - sensitive
        - final-decision
        - external-intake
    RecommendationClassification:
      type: string
      enum:
        - documented-fact
        - user-update
        - ai-recommendation
        - draft-idea
        - pending-approval
        - approved-decision
        - sensitive
    RecommendationRiskLevel:
      type: string
      enum: [low, medium, high, critical]
    RecommendationApprovalRoute:
      type: string
      enum: [rose, carmen, both, none]
    RecommendationStatus:
      type: string
      enum: [pending, approved, rejected, needs-revision]
    RecommendationHistoryEntry:
      type: object
      required: [id, timestamp, actor, action]
      properties:
        id: { type: string }
        timestamp: { type: string }
        actor: { type: string }
        action: { type: string }
    RecommendationApprovals:
      type: object
      required: [rose, carmen]
      properties:
        rose: { type: boolean }
        carmen: { type: boolean }
    RecommendationRecord:
      type: object
      required:
        - id
        - source
        - category
        - recommendation
        - classification
        - risk
        - requiredApprover
        - status
        - approvals
        - history
        - createdAt
        - updatedAt
      properties:
        id: { type: integer }
        source: { type: string }
        category: { $ref: "#/components/schemas/RecommendationCategory" }
        recommendation: { type: string }
        classification: { $ref: "#/components/schemas/RecommendationClassification" }
        risk: { $ref: "#/components/schemas/RecommendationRiskLevel" }
        requiredApprover: { $ref: "#/components/schemas/RecommendationApprovalRoute" }
        status: { $ref: "#/components/schemas/RecommendationStatus" }
        approvals: { $ref: "#/components/schemas/RecommendationApprovals" }
        history:
          type: array
          items: { $ref: "#/components/schemas/RecommendationHistoryEntry" }
        createdById: { type: ["integer", "null"] }
        createdByName: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
    RecommendationInput:
      type: object
      required: [source, category, recommendation, classification, risk, requiredApprover]
      properties:
        source: { type: string, minLength: 1 }
        category: { $ref: "#/components/schemas/RecommendationCategory" }
