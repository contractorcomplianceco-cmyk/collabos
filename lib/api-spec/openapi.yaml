      operationId: listIntegrationStatus
      tags: [settings]
      summary: List integration connection status
      responses:
        "200":
          description: Integration status list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationStatusRecord"
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
