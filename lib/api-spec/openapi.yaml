  /projects/blockers/{id}:
    patch:
      operationId: updateProjectBlocker
      tags: [projects]
      summary: Update a manual project blocker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
