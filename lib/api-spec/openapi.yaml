openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management (admin)
  - name: audit
    description: Audit logs
  - name: mockups
    description: Mockup Studio
  - name: recommendations
    description: Review Queue recommendations
  - name: ideas
    description: Innovation Lab ideas
  - name: mindMeld
    description: Mind Meld Room shared state
  - name: intake
    description: External Intake items
  - name: memory
    description: Memory preservation candidates
  - name: feedback
    description: Team Pulse feedback items
  - name: settings
    description: Workspace app settings
  - name: projects
    description: Project registry and blockers
  - name: registry
    description: Company Brain records, decisions, automations, duplicate risks, alerts, build items, and tasks
  - name: market
    description: Market pulse signals and competitor watch
  - name: reports
    description: Executive report templates
  - name: agentWork
    description: Agent work requests and execution handoff
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out and invalidate the session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /auth/module-seen:
    patch:
      operationId: markModuleSeen
      tags: [auth]
      summary: Record that the user visited a workspace module
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleSeenInput"
      responses:
        "200":
          description: Updated user profile with module timestamps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid module
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "401":
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /users/{id}/reset-password:
    post:
      operationId: resetUserPassword
      tags: [users]
      summary: Reset a user's password to a temporary one (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Temporary password issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TempPasswordResult"
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs (admin / leadership only)
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
    post:
      operationId: recordAuditEvent
      tags: [audit]
      summary: Record an audit event for an in-app action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditEventInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogEntry"
  /mockups:
    get:
      operationId: listMockups
      tags: [mockups]
      summary: List mockups
      responses:
        "200":
          description: Mockups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MockupRecord"
    post:
      operationId: createMockup
      tags: [mockups]
      summary: Create a mockup concept
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockupRecord"
  /mockups/{id}:
    get:
      operationId: getMockup
      tags: [mockups]
      summary: Get a mockup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mockup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockupRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
    patch:
      operationId: updateMockup
      tags: [mockups]
      summary: Update a mockup's brief, screens, or visual direction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockupUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockupRecord"
    delete:
      operationId: deleteMockup
      tags: [mockups]
      summary: Delete a mockup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /mockups/{id}/status:
    post:
      operationId: changeMockupStatus
      tags: [mockups]
      summary: Change a mockup's approval status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockupStatusChange"
      responses:
        "200":
          description: Status changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockupRecord"
        "403":
          description: Not permitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /mockups/{id}/versions:
    get:
      operationId: listMockupVersions
      tags: [mockups]
      summary: List versions of a mockup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MockupVersionRecord"
    post:
      operationId: createMockupVersion
      tags: [mockups]
      summary: Snapshot the current mockup as a named version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockupVersionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockupVersionRecord"
  /recommendations:
    get:
      operationId: listRecommendations
      tags: [recommendations]
      summary: List review queue recommendations
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecommendationRecord"
    post:
      operationId: createRecommendation
      tags: [recommendations]
      summary: Create a pending recommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationRecord"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /recommendations/{id}/status:
    post:
      operationId: changeRecommendationStatus
      tags: [recommendations]
      summary: Approve, reject, or revise a recommendation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationStatusChange"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationRecord"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /ideas:
    get:
      operationId: listIdeas
      tags: [ideas]
      summary: List innovation lab ideas
      responses:
        "200":
          description: Ideas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdeaRecord"
    post:
      operationId: createIdea
      tags: [ideas]
      summary: Submit a new idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdeaRecord"
  /ideas/{id}/status:
    patch:
      operationId: updateIdeaStatus
      tags: [ideas]
      summary: Update an idea status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaStatusChange"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdeaRecord"
  /mind-meld/items:
    get:
      operationId: listMindMeldItems
      tags: [mindMeld]
      summary: List Mind Meld items
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MindMeldItemRecord"
    post:
      operationId: createMindMeldItem
      tags: [mindMeld]
      summary: Create a Mind Meld item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MindMeldItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MindMeldItemRecord"
  /mind-meld/handoffs:
    get:
      operationId: listMindMeldHandoffs
      tags: [mindMeld]
      summary: List Mind Meld handoffs
      responses:
        "200":
          description: Handoffs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MindMeldHandoffRecord"
  /mind-meld/timeline:
    get:
      operationId: listMindMeldTimeline
      tags: [mindMeld]
      summary: List Mind Meld timeline events
      responses:
        "200":
          description: Timeline
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MindMeldTimelineRecord"
  /mind-meld/feed:
    get:
      operationId: listMindMeldFeed
      tags: [mindMeld]
      summary: List decorative Mind Meld feed entries
      responses:
        "200":
          description: Mind feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MindFeedRecord"
  /mind-meld/items/{id}/carmenfy:
    post:
      operationId: carmenfyMindMeldItem
      tags: [mindMeld]
      summary: Route a Mind Meld item to Carmen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MindMeldActionNote"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MindMeldItemRecord"
  /mind-meld/items/{id}/rosify:
    post:
      operationId: rosifyMindMeldItem
      tags: [mindMeld]
      summary: Route a Mind Meld item to Rose
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MindMeldActionNote"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MindMeldItemRecord"
  /mind-meld/items/{id}/thoughts:
    post:
      operationId: addMindMeldThought
      tags: [mindMeld]
      summary: Add or update a founder thought on a Mind Meld item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MindMeldThoughtInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MindMeldItemRecord"
  /intake/items:
    get:
      operationId: listIntakeItems
      tags: [intake]
      summary: List external intake items
      responses:
        "200":
          description: Intake items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntakeItemRecord"
    post:
      operationId: createIntakeItem
      tags: [intake]
      summary: Capture a new external intake item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeItemRecord"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /intake/items/{id}:
    patch:
      operationId: updateIntakeItem
      tags: [intake]
      summary: Update an intake item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeItemRecord"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /memory-candidates:
