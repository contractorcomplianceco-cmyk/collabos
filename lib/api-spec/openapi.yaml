      operationId: listMemoryCandidates
      tags: [memory]
      summary: List memory preservation candidates
      responses:
        "200":
          description: Memory candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryCandidateRecord"
    post:
      operationId: createMemoryCandidate
      tags: [memory]
      summary: Propose a memory preservation candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryCandidateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryCandidateRecord"
  /memory-candidates/{id}/status:
    patch:
      operationId: updateMemoryCandidateStatus
